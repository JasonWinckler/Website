<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

                <strong>Corissia Resorts - Best Hotel on Crete</strong>

              <span>
                <strong>Instagram</strong>

              </span>

            <a class="link-button" href="/" rel="noopener">

    <script src="script.js"></script>
